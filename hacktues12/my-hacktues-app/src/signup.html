<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - YearnToLearn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span>YearnToLearn</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Начало</a></li>
                <li><a href="subjects.html">Предмети</a></li>
                <li><a href="teachers.html">Учители</a></li>
                <li><a href="subscription.html">Абонамент</a></li>
                <li><a href="login.html">Вход</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Регистрация</h1>
            <p class="subtitle">Създай нов акаунт</p>

            <form action="https://localhost:5000/auth/register" method="POST" class="form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">Име:</label>
                        <input 
                            type="text" 
                            id="firstname" 
                            name="firstname" 
                            placeholder="Иван"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="lastname">Фамилия:</label>
                        <input 
                            type="text" 
                            id="lastname" 
                            name="lastname" 
                            placeholder="Петров"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Имейл:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Телефонен номер:</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phonenumber" 
                        placeholder="+359..."
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Парола:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="pass" 
                        placeholder="Минимум 8 символа"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">Избери роля:</label>
                    <select id="role" name="role" required>
                        <option value="student">Студент</option>
                        <option value="teacher">Учител</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary full-width">Регистрирай се</button>
            </form>

            <p class="footer-text">
                Вече имаш акаунт? <a href="login.html">Влез</a>
            </p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 YearnToLearn.</p>
        </div>
    </footer>
</body>
</html>
