<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - YearnToLearn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span>YearnToLearn</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Начало</a></li>
                <li><a href="subjects.html">Предмети</a></li>
                <li><a href="teachers.html">Учители</a></li>
                <li><a href="subscription.html">Абонамент</a></li>
                <li><a href="login.html" class="active">Вход</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Вход</h1>
            <p class="subtitle">Влез в твоя акаунт</p>

            <form action="https://localhost:5000/auth/login" method="POST" class="form">
                <div class="form-group">
                    <label for="email">Имейл:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Парола:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary full-width">Вход</button>
            </form>

            <p class="footer-text">
                Нямаш акаунт? <a href="signup.html">Регистрирай се</a>
            </p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 YearnToLearn.</p>
        </div>
    </footer>
</body>
</html>
